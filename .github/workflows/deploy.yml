name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update image tags
        run: |
          # Get the full SHA and cut it to the first 7 characters
          FULL_SHA=${{ github.event.workflow_run.head_sha }}
          VERSION=$(echo $FULL_SHA | cut -c 1-7)
          
          # Update backend image
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/backend:.*|ghcr.io/masond-007/nextjs_golang_template/backend:${VERSION}|g" k3s/apps/backend/deployment.yaml
          
          # Update frontend image
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/frontend:.*|ghcr.io/masond-007/nextjs_golang_template/frontend:${VERSION}|g" k3s/apps/frontend/deployment.yaml
          
          echo "Updated image tags to: ${VERSION}"
          echo "Backend:"
          grep "image:" k3s/apps/backend/deployment.yaml
          echo "Frontend:"
          grep "image:" k3s/apps/frontend/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Get the full SHA and cut it to the first 7 characters
          FULL_SHA=${{ github.event.workflow_run.head_sha }}
          VERSION=$(echo $FULL_SHA | cut -c 1-7)
          
          # Stage the files first
          git add k3s/apps/backend/deployment.yaml k3s/apps/frontend/deployment.yaml
          
          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update image tags to ${VERSION}"
          
          # Pull and rebase to avoid non-fast-forward errors
          git pull --rebase origin main
          git push origin main

      - name: Show changes
        run: |
          git diff HEAD~1 -- k3s/apps/
