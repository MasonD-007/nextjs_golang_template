name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update image tags
        run: |
          VERSION=${{ github.event.workflow_run.head_sha }}
          
          # Update backend image
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/backend:.*|ghcr.io/masond-007/nextjs_golang_template/backend:${VERSION}|g" k3s/apps/backend/deployment.yaml
          
          # Update frontend image
          sed -i "s|ghcr.io/masond-007/nextjs_golang_template/frontend:.*|ghcr.io/masond-007/nextjs_golang_template/frontend:${VERSION}|g" k3s/apps/frontend/deployment.yaml
          
          echo "Updated image tags to: ${VERSION}"
          echo "Backend:"
          grep "image:" k3s/apps/backend/deployment.yaml
          echo "Frontend:"
          grep "image:" k3s/apps/frontend/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          VERSION=${{ github.event.workflow_run.head_sha }}
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add k3s/apps/backend/deployment.yaml k3s/apps/frontend/deployment.yaml
          git commit -m "chore: update image tags to ${VERSION}"
          git push origin main

      - name: Show changes
        run: |
          git diff HEAD~1 -- k3s/apps/
